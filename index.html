<!doctype html>
<html lang="ro"> <!-- Am schimbat 'en' în 'ro' pentru că site-ul tău e în română -->
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon-ul tău custom (Logo-ul InfoMotion) -->
    <link rel="icon" type="image/svg+xml" href="/logo-infomotion.svg?v=2" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Titlul care apare în tab-ul browserului -->
    <title>InfoMotion - Descoperă logica din spatele codului</title>
    
    <!-- OPTIMIZARE: Preconnect pentru Fontshare (pentru încărcare rapidă) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
  </head>
